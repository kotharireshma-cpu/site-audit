<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0c0f">
<title>CS Site Audit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c0f;--surf:#111318;--surf2:#1a1d24;--surf3:#222530;
  --b:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.13);
  --t:#e8eaf0;--t2:#8a8fa8;--t3:#555a70;
  --g:#00e5a0;--g2:#00b37d;--w:#f5a623;--r:#ff4d4d;--bl:#4d9fff;
  --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
  --rad:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:var(--sans);background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6;font-size:15px;}

/* ── SPLASH ── */
#splash{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;text-align:center;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(0,229,160,0.08) 0%,transparent 70%);}
.logo{width:60px;height:60px;border:2px solid var(--g);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:16px;color:var(--g);margin:0 auto 1.5rem;position:relative;}
.logo::after{content:'';position:absolute;inset:-5px;border-radius:18px;border:1px solid rgba(0,229,160,0.15);}
#splash h1{font-size:2rem;font-weight:700;letter-spacing:-0.03em;margin-bottom:0.3rem;}
#splash h1 span{color:var(--g);}
#splash>p{color:var(--t2);font-size:0.85rem;margin-bottom:1.5rem;}

.card{background:var(--surf);border:1px solid var(--b);border-radius:var(--rad);padding:1.2rem;width:100%;max-width:440px;margin-bottom:1.25rem;text-align:left;}
.card-title{font-size:0.7rem;font-family:var(--mono);color:var(--g);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:0.9rem;}
.field{margin-bottom:0.75rem;}
.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:0.68rem;font-family:var(--mono);color:var(--t3);margin-bottom:4px;letter-spacing:0.04em;}
.field input,.field select{width:100%;padding:10px 12px;background:var(--surf2);border:1px solid var(--b);border-radius:9px;color:var(--t);font-family:var(--mono);font-size:0.85rem;transition:border-color 0.2s;appearance:none;}
.field input:focus,.field select:focus{outline:none;border-color:var(--g);}
.field input::placeholder{color:var(--t3);}
.field select option{background:var(--surf2);}

.btn-primary{width:100%;max-width:440px;background:var(--g);color:#000;border:none;padding:0.9rem;border-radius:50px;font-family:var(--sans);font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.02em;}
.btn-primary:hover{background:var(--g2);}
.btn-primary:disabled{opacity:0.35;cursor:not-allowed;}
.btn-primary:active{transform:scale(0.98);}

/* ── TOPBAR ── */
#app{display:none;min-height:100vh;flex-direction:column;}
.topbar{display:flex;align-items:center;padding:0 1rem;height:52px;background:var(--surf);border-bottom:1px solid var(--b);gap:0.75rem;position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:var(--mono);font-size:0.75rem;color:var(--g);letter-spacing:0.05em;flex-shrink:0;}
.topbar-info{flex:1;min-width:0;}
.topbar-site{font-size:0.82rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-eng{font-size:0.65rem;font-family:var(--mono);color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prog-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.prog-track{width:60px;height:4px;background:var(--surf3);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--g);border-radius:2px;transition:width 0.4s;}
.prog-pct{font-family:var(--mono);font-size:0.68rem;color:var(--t2);width:28px;}
.btn-sm{background:none;border:1px solid var(--b);color:var(--t2);padding:4px 10px;border-radius:16px;font-size:0.7rem;cursor:pointer;font-family:var(--sans);white-space:nowrap;}
.btn-sm:active{background:var(--surf2);}

/* ── BOTTOM NAV ── */
.bottom-nav{display:flex;background:var(--surf);border-top:1px solid var(--b);position:sticky;bottom:0;z-index:100;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border:none;background:none;cursor:pointer;font-family:var(--sans);font-size:0.6rem;color:var(--t3);transition:color 0.2s;gap:3px;position:relative;}
.bnav-btn .ico{font-size:1.2rem;}
.bnav-btn.active{color:var(--g);}
.bnav-btn .dot{position:absolute;top:6px;right:calc(50% - 14px);width:6px;height:6px;border-radius:50%;background:var(--g);opacity:0;}
.bnav-btn .dot.on{opacity:1;}

/* ── CONTENT ── */
.content{flex:1;padding:1rem;max-width:600px;margin:0 auto;width:100%;padding-bottom:80px;}
.page{display:none;animation:fu 0.2s ease;}
.page.active{display:block;}
@keyframes fu{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.sec-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px;}
.sec-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.95rem;flex-shrink:0;}
.sec-score{font-family:var(--mono);font-size:0.72rem;padding:3px 10px;border-radius:16px;background:var(--surf2);color:var(--t2);}

/* ── Q CARDS ── */
.q-card{background:var(--surf);border:1px solid var(--b);border-radius:var(--rad);padding:1rem;margin-bottom:8px;transition:border-color 0.2s;}
.q-card.answered{border-color:var(--b2);}
.q-top{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;}
.q-num{flex-shrink:0;width:22px;height:22px;border-radius:6px;background:var(--surf3);font-family:var(--mono);font-size:0.65rem;display:flex;align-items:center;justify-content:center;color:var(--t3);margin-top:2px;}
.q-text{font-size:0.84rem;line-height:1.5;font-weight:500;}
.q-opts{display:flex;gap:6px;margin-bottom:8px;}
.opt{flex:1;padding:8px 4px;border-radius:8px;border:1px solid var(--b);background:none;font-family:var(--sans);font-size:0.72rem;font-weight:700;color:var(--t3);cursor:pointer;transition:all 0.15s;text-align:center;}
.opt:active{transform:scale(0.97);}
.opt.yes.sel{background:rgba(0,229,160,0.12);border-color:var(--g);color:var(--g);}
.opt.par.sel{background:rgba(245,166,35,0.12);border-color:var(--w);color:var(--w);}
.opt.no.sel{background:rgba(255,77,77,0.12);border-color:var(--r);color:var(--r);}
.q-note{width:100%;padding:8px 10px;background:var(--surf2);border:1px solid var(--b);border-radius:8px;color:var(--t);font-family:var(--mono);font-size:0.75rem;resize:none;height:48px;transition:border-color 0.2s;}
.q-note:focus{outline:none;border-color:var(--g);}
.q-note::placeholder{color:var(--t3);}

/* ── MEDIA ── */
.upload-box{border:1.5px dashed var(--b2);border-radius:var(--rad);padding:2rem 1rem;text-align:center;cursor:pointer;position:relative;transition:all 0.2s;background:var(--surf);}
.upload-box input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-box:active{border-color:var(--g);}
.upload-ico{font-size:2rem;margin-bottom:0.5rem;display:block;}
.upload-box h3{font-size:0.88rem;margin-bottom:2px;}
.upload-box p{font-size:0.72rem;color:var(--t3);font-family:var(--mono);}
.media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:0.75rem;}
.m-item{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;border:1px solid var(--b);background:var(--surf2);}
.m-item img{width:100%;height:100%;object-fit:cover;}
.m-item .del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.75);border:none;color:#fff;width:20px;height:20px;border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-ai{width:100%;margin-top:0.75rem;background:rgba(0,229,160,0.1);border:1px solid var(--g);color:var(--g);padding:0.75rem;border-radius:var(--rad);font-family:var(--sans);font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn-ai:disabled{opacity:0.4;cursor:not-allowed;}
.btn-ai:active{background:rgba(0,229,160,0.2);}
.ai-box{background:var(--surf);border:1px solid var(--b);border-left:3px solid var(--g);border-radius:var(--rad);padding:1rem;margin-top:0.75rem;font-size:0.8rem;line-height:1.7;color:var(--t2);display:none;}
.ai-box h4{font-size:0.72rem;color:var(--g);font-family:var(--mono);margin-bottom:0.5rem;letter-spacing:0.05em;}
.ai-box strong{color:var(--t);}
.ai-box p{margin-bottom:0.4rem;}

/* ── SUMMARY ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
.kpi{background:var(--surf);border:1px solid var(--b);border-radius:var(--rad);padding:0.9rem;}
.kpi-label{font-size:0.65rem;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;}
.kpi-val{font-size:1.6rem;font-weight:700;line-height:1;}
.kpi-val.g{color:var(--g);}.kpi-val.w{color:var(--w);}.kpi-val.r{color:var(--r);}
.bars{background:var(--surf);border:1px solid var(--b);border-radius:var(--rad);overflow:hidden;margin-bottom:1rem;}
.bar-row{display:flex;align-items:center;gap:8px;padding:0.7rem 1rem;border-bottom:1px solid var(--b);}
.bar-row:last-child{border-bottom:none;}
.bar-lbl{width:90px;font-size:0.72rem;color:var(--t2);font-weight:500;flex-shrink:0;}
.bar-wrap{flex:1;height:5px;background:var(--surf3);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width 0.6s cubic-bezier(.4,0,.2,1);}
.bar-pct{font-family:var(--mono);font-size:0.68rem;color:var(--t2);width:30px;text-align:right;}
.chip{font-size:0.65rem;font-family:var(--mono);font-weight:700;padding:2px 8px;border-radius:8px;}
.chip-g{background:rgba(0,229,160,0.12);color:var(--g);}
.chip-w{background:rgba(245,166,35,0.12);color:var(--w);}
.chip-r{background:rgba(255,77,77,0.12);color:var(--r);}

.btn-submit{width:100%;background:var(--g);color:#000;border:none;padding:0.9rem;border-radius:var(--rad);font-family:var(--sans);font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-bottom:0.75rem;}
.btn-submit:disabled{opacity:0.4;cursor:not-allowed;}
.btn-submit:active{transform:scale(0.98);}
.sub-status{text-align:center;font-family:var(--mono);font-size:0.78rem;margin-bottom:1rem;min-height:1.2rem;}
.sub-status.ok{color:var(--g);}.sub-status.err{color:var(--r);}

/* ── LIVE FEED ── */
.feed-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.6rem;}
.feed-title{font-size:0.7rem;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:0.06em;display:flex;align-items:center;gap:6px;}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--g);animation:pulse 2s ease-in-out infinite;display:inline-block;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.25;}}
.btn-refresh{background:none;border:1px solid var(--b);color:var(--t3);padding:4px 10px;border-radius:16px;font-size:0.68rem;cursor:pointer;font-family:var(--mono);}
.btn-refresh:active{border-color:var(--g);color:var(--g);}
.feed-list{background:var(--surf);border:1px solid var(--b);border-radius:var(--rad);overflow:hidden;}
.feed-item{padding:0.75rem 1rem;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px;}
.feed-item:last-child{border-bottom:none;}
.feed-score{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:0.78rem;font-weight:700;flex-shrink:0;}
.feed-info{flex:1;min-width:0;}
.feed-eng{font-size:0.82rem;font-weight:700;color:var(--t);}
.feed-site{font-size:0.7rem;color:var(--bl);font-family:var(--mono);}
.feed-dt{font-size:0.65rem;color:var(--t3);font-family:var(--mono);}
.feed-empty{padding:1.5rem;text-align:center;color:var(--t3);font-family:var(--mono);font-size:0.75rem;}

.dots::after{content:'';animation:ell 1.2s steps(3,end) infinite;}
@keyframes ell{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="logo">CS</div>
  <h1>Site <span>Audit</span></h1>
  <p>Construction & Sales Office inspection</p>

  <div class="card">
    <div class="card-title">// Engineer Details</div>
    <div class="field">
      <label>YOUR NAME</label>
      <input type="text" id="engName" placeholder="Full name" oninput="chk()">
    </div>
    <div class="field">
      <label>SITE</label>
      <select id="siteSelect" onchange="chk()">
        <option value="">— Select site —</option>
        <option>Versova</option>
        <option>Powai</option>
        <option>Bandra</option>
        <option>Panvel</option>
        <option>Nariman Point</option>
      </select>
    </div>
    <div class="field">
      <label>DATE</label>
      <input type="date" id="aDate" oninput="chk()">
    </div>
    <div class="field">
      <label>TIME</label>
      <input type="time" id="aTime" oninput="chk()">
    </div>
  </div>

  <button class="btn-primary" id="btnStart" onclick="startAudit()">Begin Audit →</button>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">CS//</div>
    <div class="topbar-info">
      <div class="topbar-site" id="tSite"></div>
      <div class="topbar-eng" id="tEng"></div>
    </div>
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <div class="prog-pct" id="progPct">0%</div>
    </div>
    <button class="btn-sm" onclick="goSplash()">← Back</button>
  </div>

  <div class="content" id="content"></div>

  <div class="bottom-nav" id="bottomNav"></div>
</div>

<script>
// ══════════════════════════════════════════
// ⚠️  PASTE YOUR GOOGLE APPS SCRIPT URL HERE
// ══════════════════════════════════════════
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyeHn8jxaSA-KDpb8MzL_D9_WAwY8UM0HNIyP4mQbsCYHFapJP-CX3LRYIUTbC2OImyvw/exec?action=get
';
// Example: 'https://script.google.com/macros/s/AKfycb.../exec'

const SECTIONS = [
  { id:'structural', label:'Structural', icon:'⚒️', color:'#f5a623',
    qs:['Is the structural slab/frame work completed per current stage plan?',
        'Are concrete pours, curing, and reinforcement inspected and signed off?',
        'Is the external facade and waterproofing work progressing on schedule?',
        'Are internal partition walls and plastering complete in due areas?',
        'Is the site free from structural defects, cracks, or settlement concerns?']},
  { id:'mep', label:'Electrical & MEP', icon:'⚡', color:'#4d9fff',
    qs:['Is electrical wiring, conduit routing, and DB board installation complete in due areas?',
        'Are plumbing lines, drainage, and sanitary fittings installed and tested?',
        'Is HVAC ducting, FCU, and AHU installation progressing per schedule?',
        'Are earthing, bonding, and safety isolators correctly installed?',
        'Is the main LV panel / DG set installed and commissioned as required?']},
  { id:'fitout', label:'Sales Fit-out', icon:'🪑', color:'#a78bfa',
    qs:['Is flooring (tiles, vinyl, or wood) laid and finished without defects?',
        'Are ceiling works (false ceiling, lighting fixtures) complete and defect-free?',
        'Is furniture, display, and branding material installed as per design plan?',
        'Are doors, windows, glazing, and hardware installed and operational?',
        'Is the sales office clean, presentable, and ready for client visits?']},
  { id:'fire', label:'Fire & Security', icon:'🔥', color:'#fb7185',
    qs:['Are fire sprinkler heads installed, pressurised, and free from obstruction?',
        'Are fire extinguishers placed at designated points with valid inspection tags?',
        'Are smoke and heat detectors installed and connected to the panel?',
        'Are emergency exit signs illuminated and exit routes clear?',
        'Is the fire alarm control panel operational with no active faults?']},
  { id:'cctv', label:'CCTV', icon:'📷', color:'#00e5a0',
    qs:['Are CCTV cameras installed at all entry/exit and critical coverage points?',
        'Is the DVR/NVR operational with adequate storage and retention settings?',
        'Are camera angles set correctly with no blind spots at key areas?',
        'Is cabling neatly routed and terminated with no exposed runs?',
        'Is remote viewing access configured and tested?']},
  { id:'it', label:'IT Infrastructure', icon:'🌐', color:'#ff4d4d',
    qs:['Are network points (data outlets) installed and labelled in all required areas?',
        'Is the server room / IT rack installed, ventilated, and secured?',
        'Are Wi-Fi access points installed for full site coverage?',
        'Is structured cabling (CAT6/fibre) terminated and tested?',
        'Is internet connectivity live and tested at the site?']},
  { id:'obs', label:'Observations', icon:'👁️', color:'#8a8fa8',
    qs:['Is the site free from water ingress, leaks, or damp issues?',
        'Is housekeeping maintained with debris and waste removed regularly?',
        'Is site access controlled with visitor register and ID checks in place?',
        'Are safety signage, PPE requirements, and hazard notices displayed?',
        'Are all sub-contractor works coordinated without conflicts or delays?']},
];

let S = { engineer:'', site:'', date:'', time:'', answers:{}, notes:{}, media:[], aiText:'' };
let curTab = 'structural';

// ── INIT ──
(function(){
  const n = new Date();
  document.getElementById('aDate').value = n.toISOString().slice(0,10);
  document.getElementById('aTime').value = n.toTimeString().slice(0,5);
})();

function chk(){
  const name = document.getElementById('engName').value.trim();
  const site = document.getElementById('siteSelect').value;
  const date = document.getElementById('aDate').value;
  const time = document.getElementById('aTime').value;
  const ok   = name.length > 0 && site.length > 0 && date.length > 0 && time.length > 0;
  const btn  = document.getElementById('btnStart');
  btn.disabled = !ok;
  btn.style.opacity = ok ? '1' : '0.35';
}

function startAudit(){
  S.engineer = document.getElementById('engName').value.trim();
  S.site     = document.getElementById('siteSelect').value;
  S.date     = document.getElementById('aDate').value;
  S.time     = document.getElementById('aTime').value;
  S.answers={}; S.notes={}; S.media=[]; S.aiText='';

  document.getElementById('splash').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('tSite').textContent = S.site;
  document.getElementById('tEng').textContent  = S.engineer+' · '+fmtDate(S.date)+' '+S.time;

  buildApp();
}

function goSplash(){
  document.getElementById('app').style.display='none';
  document.getElementById('splash').style.display='flex';
}

function fmtDate(d){
  if(!d) return '';
  const [y,m,day]=d.split('-');
  return day+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+' '+y;
}

// ── BUILD ──
function buildApp(){
  buildNav();
  buildContent();
  switchTab('structural');
}

function buildNav(){
  const nav = document.getElementById('bottomNav');
  const tabs = [...SECTIONS.map(s=>({id:s.id,ico:s.icon,lbl:s.label.split(' ')[0]})),
                {id:'media',ico:'📸',lbl:'Media'},
                {id:'summary',ico:'📋',lbl:'Submit'}];
  nav.innerHTML = tabs.map(t=>
    `<button class="bnav-btn" id="bnav-${t.id}" onclick="switchTab('${t.id}')">
      <span class="ico">${t.ico}</span>
      <span>${t.lbl}</span>
      <span class="dot" id="dot-${t.id}"></span>
    </button>`
  ).join('');
}

function buildContent(){
  const c = document.getElementById('content');
  c.innerHTML = '';

  SECTIONS.forEach(sec=>{
    const div=document.createElement('div');
    div.className='page'; div.id='page-'+sec.id;
    div.innerHTML=`
      <div class="sec-header">
        <div class="sec-title"><div class="sec-icon" style="background:${sec.color}20">${sec.icon}</div>${sec.label}</div>
        <div class="sec-score" id="stag-${sec.id}">0 / 5</div>
      </div>
      ${sec.qs.map((q,i)=>qCard(sec.id,i,q)).join('')}`;
    c.appendChild(div);
  });

  // Media page
  const mp=document.createElement('div');
  mp.className='page'; mp.id='page-media';
  mp.innerHTML=`
    <div class="sec-header"><div class="sec-title"><div class="sec-icon" style="background:#4d9fff20">📸</div>Media & AI</div></div>
    <div class="upload-box">
      <input type="file" id="fileInput" accept="image/*" multiple capture="environment" onchange="handleFiles(this.files)">
      <span class="upload-ico">📷</span>
      <h3>Take or upload photos</h3>
      <p>Up to 5 images · AI analysis included</p>
    </div>
    <div class="media-grid" id="mediaGrid"></div>
    <button class="btn-ai" id="btnAI" onclick="analyseMedia()">✦ Analyse with AI</button>
    <div class="ai-box" id="aiBox"></div>`;
  c.appendChild(mp);

  // Summary page
  const sp=document.createElement('div');
  sp.className='page'; sp.id='page-summary';
  sp.innerHTML=`<div id="summaryContent"></div>`;
  c.appendChild(sp);
}

function qCard(sid,i,q){
  const k=sid+'-'+i;
  return `<div class="q-card" id="qc-${k}">
    <div class="q-top"><div class="q-num">${i+1}</div><div class="q-text">${q}</div></div>
    <div class="q-opts">
      <button class="opt yes"     onclick="setAns('${k}','yes',this)">✓ Yes</button>
      <button class="opt par"     onclick="setAns('${k}','partial',this)">~ Partial</button>
      <button class="opt no"      onclick="setAns('${k}','no',this)">✗ No</button>
    </div>
    <textarea class="q-note" placeholder="Note…" rows="2" onchange="S.notes['${k}']=this.value"></textarea>
  </div>`;
}

function setAns(k,v,btn){
  S.answers[k]=v;
  const card=document.getElementById('qc-'+k);
  card.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel'); card.classList.add('answered');
  updateProg();
  updateTag(k.split('-')[0]);
  document.getElementById('dot-'+k.split('-')[0])?.classList.add('on');
}

function updateProg(){
  const total=SECTIONS.reduce((a,s)=>a+s.qs.length,0);
  const done=Object.keys(S.answers).length;
  const pct=Math.round((done/total)*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
}

function secScore(sid){
  const sec=SECTIONS.find(s=>s.id===sid);
  let sc=0,ans=0;
  sec.qs.forEach((_,i)=>{
    const a=S.answers[sid+'-'+i];
    if(a){ans++;if(a==='yes')sc+=2;else if(a==='partial')sc+=1;}
  });
  return ans?Math.round((sc/(sec.qs.length*2))*100):null;
}

function updateTag(sid){
  const sc=secScore(sid);
  const ans=SECTIONS.find(s=>s.id===sid).qs.filter((_,i)=>S.answers[sid+'-'+i]).length;
  const tag=document.getElementById('stag-'+sid);
  if(tag) tag.textContent=sc!==null?sc+'%':ans+' / 5';
}

function overall(){
  const scores=SECTIONS.map(s=>secScore(s.id)).filter(s=>s!==null);
  return scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
}

function chip(sc){
  if(sc===null) return '<span class="chip" style="background:var(--surf3);color:var(--t3)">—</span>';
  if(sc>=75) return '<span class="chip chip-g">LOW</span>';
  if(sc>=50) return '<span class="chip chip-w">MED</span>';
  return '<span class="chip chip-r">HIGH</span>';
}

function barClr(sc){
  if(sc===null) return 'var(--surf3)';
  if(sc>=75) return 'var(--g)';
  if(sc>=50) return 'var(--w)';
  return 'var(--r)';
}

function switchTab(id){
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('bnav-'+id)?.classList.add('active');
  document.getElementById('page-'+id)?.classList.add('active');
  document.getElementById('content').scrollTop=0;
  curTab=id;
  if(id==='summary') renderSummary();
}

// ── MEDIA ──
function handleFiles(files){
  Array.from(files).forEach(f=>{
    if(!f.type.startsWith('image/')) return;
    const r=new FileReader();
    r.onload=e=>{
      if(S.media.length>=5){alert('Max 5 images');return;}
      S.media.push({name:f.name,type:f.type,data:e.target.result});
      renderMedia();
    };
    r.readAsDataURL(f);
  });
}
function renderMedia(){
  const g=document.getElementById('mediaGrid');
  if(!g) return;
  g.innerHTML=S.media.map((m,i)=>`
    <div class="m-item"><img src="${m.data}">
    <button class="del" onclick="rmMedia(${i})">×</button></div>`).join('');
}
function rmMedia(i){S.media.splice(i,1);renderMedia();}

async function analyseMedia(){
  if(!S.media.length){alert('Upload at least one photo first.');return;}
  const btn=document.getElementById('btnAI'),box=document.getElementById('aiBox');
  btn.disabled=true; btn.innerHTML='<span class="dots">Analysing</span>';
  box.style.display='block'; box.innerHTML='<h4>AI // ANALYSIS</h4><span class="dots">Processing</span>';

  const imgs=S.media.slice(0,5);
  const content=[{type:'text',text:`You are a senior construction and sales office site auditor. Analyse these site photos from ${S.site}.\n\nProvide:\n1. **Structural & Civil Observations**\n2. **MEP & Services Status**\n3. **Safety Concerns**\n4. **Fit-out & Finishing Quality**\n5. **Top 3 Priority Actions**\n\nBe concise and specific.`}];
  imgs.forEach(img=>content.push({type:'image',source:{type:'base64',media_type:img.type,data:img.data.split(',')[1]}}));

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content}]})
    });
    const data=await resp.json();
    const text=(data.content||[]).map(c=>c.text||'').join('\n');
    const html=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
    S.aiText=text;
    box.innerHTML='<h4>✦ AI ANALYSIS · '+S.site.toUpperCase()+'</h4><p>'+html+'</p>';
    document.getElementById('dot-media')?.classList.add('on');
  }catch(e){
    box.innerHTML='<h4>AI // ANALYSIS</h4><p style="color:var(--r)">Failed. Check connection and retry.</p>';
  }
  btn.disabled=false; btn.innerHTML='✦ Re-analyse';
}

// ── SUMMARY ──
function renderSummary(){
  const ov=overall();
  const total=SECTIONS.reduce((a,s)=>a+s.qs.length,0);
  const answered=Object.keys(S.answers).length;
  const vc=ov===null?'':ov>=75?'g':ov>=50?'w':'r';

  let html=`
    <div class="sec-header">
      <div class="sec-title"><div class="sec-icon" style="background:#00e5a020">📋</div>Summary</div>
    </div>
    <div style="font-size:0.7rem;color:var(--t3);font-family:var(--mono);margin-bottom:1rem;">${S.engineer} · ${S.site} · ${fmtDate(S.date)} ${S.time}</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Overall Score</div><div class="kpi-val ${vc}">${ov!==null?ov+'%':'—'}</div></div>
      <div class="kpi"><div class="kpi-label">Risk Level</div><div style="padding-top:4px">${chip(ov)}</div></div>
      <div class="kpi"><div class="kpi-label">Answered</div><div class="kpi-val">${answered}<span style="font-size:1rem;color:var(--t3)">/${total}</span></div></div>
      <div class="kpi"><div class="kpi-label">Photos</div><div class="kpi-val">${S.media.length}</div></div>
    </div>
    <div class="bars">
      ${SECTIONS.map(s=>{
        const sc=secScore(s.id);
        return `<div class="bar-row">
          <div class="bar-lbl">${s.icon} ${s.label.split(' ')[0]}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${sc||0}%;background:${barClr(sc)}"></div></div>
          <div class="bar-pct">${sc!==null?sc+'%':'—'}</div>
          ${chip(sc)}
        </div>`;
      }).join('')}
    </div>`;

  if(S.aiText){
    const aiHtml=S.aiText.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
    html+=`<div class="ai-box" style="display:block;border-left-color:var(--bl)"><h4 style="color:var(--bl)">✦ AI ANALYSIS</h4><p>${aiHtml}</p></div><br>`;
  }

  html+=`
    <button class="btn-submit" id="btnSub" onclick="submitAudit()">⬆ Submit to Google Sheets</button>
    <div class="sub-status" id="subStatus"></div>
    <div class="feed-hdr">
      <div class="feed-title"><span class="pulse"></span>Live — All Team Audits</div>
      <button class="btn-refresh" onclick="loadFeed()">↻ Refresh</button>
    </div>
    <div id="feedWrap"><div class="feed-empty">Loading<span class="dots"></span></div></div>`;

  document.getElementById('summaryContent').innerHTML=html;
  loadFeed();
}

// ── SUBMIT ──
async function submitAudit(){
  const btn=document.getElementById('btnSub');
  const status=document.getElementById('subStatus');
  btn.disabled=true; btn.textContent='Submitting…';

  const payload={
    engineer:S.engineer, site:S.site, date:S.date, time:S.time,
    overallScore:overall(),
    sections:Object.fromEntries(SECTIONS.map(s=>[s.id,secScore(s.id)])),
    answers:S.answers,
    notesText:Object.entries(S.notes).map(([k,v])=>k+': '+v).join('\n'),
    aiText:S.aiText
  };

  if(SHEET_URL==='YOUR_APPS_SCRIPT_URL_HERE'){
    status.className='sub-status err';
    status.textContent='⚠ Paste your Apps Script URL in the SHEET_URL variable';
    btn.disabled=false; btn.textContent='⬆ Submit to Google Sheets';
    return;
  }

  try{
    await fetch(SHEET_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    status.className='sub-status ok';
    status.textContent='✓ Audit submitted successfully!';
    btn.textContent='✓ Submitted';
    loadFeed();
  }catch(e){
    status.className='sub-status err';
    status.textContent='✗ Submission failed — check connection';
    btn.disabled=false; btn.textContent='↺ Retry';
  }
}

// ── LIVE FEED ──
function loadFeed(){
  const wrap=document.getElementById('feedWrap');
  if(!wrap) return;
  if(SHEET_URL==='YOUR_APPS_SCRIPT_URL_HERE'){
    wrap.innerHTML='<div class="feed-empty">Add your Apps Script URL to see live feed</div>';
    return;
  }
  wrap.innerHTML='<div class="feed-empty"><span class="dots">Loading</span></div>';
  const cb='cb'+Date.now();
  const s=document.createElement('script');
  s.src=SHEET_URL+'?action=get&callback='+cb;
  window[cb]=function(data){
    delete window[cb]; document.head.removeChild(s);
    renderFeed(data);
  };
  s.onerror=()=>{
    wrap.innerHTML='<div class="feed-empty">Could not load feed — tap Refresh to retry</div>';
    delete window[cb];
  };
  document.head.appendChild(s);
}

function renderFeed(audits){
  const wrap=document.getElementById('feedWrap');
  if(!wrap) return;
  if(!audits||!audits.length){wrap.innerHTML='<div class="feed-empty">No audits submitted yet</div>';return;}
  const clr=sc=>sc>=75?'var(--g)':sc>=50?'var(--w)':'var(--r)';
  const bg=sc=>sc>=75?'rgba(0,229,160,0.1)':sc>=50?'rgba(245,166,35,0.1)':'rgba(255,77,77,0.1)';
  wrap.innerHTML='<div class="feed-list">'+audits.map(r=>{
    const sc=Number(r.overallScore)||0;
    const dt=r.date?fmtDate(String(r.date).slice(0,10))+' '+String(r.time||'').slice(0,5):'—';
    return `<div class="feed-item">
      <div class="feed-score" style="background:${bg(sc)};color:${clr(sc)}">${sc}%</div>
      <div class="feed-info">
        <div class="feed-eng">${r.engineer||'—'}</div>
        <div class="feed-site">${r.site||'—'}</div>
        <div class="feed-dt">${dt}</div>
      </div>
      ${chip(sc)}
    </div>`;
  }).join('')+'</div>';
}
</script>
</body>
</html>
